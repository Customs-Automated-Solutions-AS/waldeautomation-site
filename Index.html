document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

); this.startSwiftTyper(); }\n\n  startSwiftTyper() {\n    clearTimeout(this._st);\n    const el = this.swiftRef.current;\n    if (!el) return;\n    const K = '#C9A6FF', T = '#6FE0A0', S = '#F4B860', M = '#7FC8FF', W = '#E7F0EA', P = '#8FA096';\n    const segs = [\n      { c: K, t: 'struct' }, { c: W, t: ' ContentView' }, { c: P, t: ': ' }, { c: T, t: 'View' }, { c: W, t: ' {' }, { c: W, t: '\\n    ' },\n      { c: K, t: 'var' }, { c: W, t: ' body' }, { c: P, t: ': ' }, { c: K, t: 'some' }, { c: T, t: ' View' }, { c: W, t: ' {' }, { c: W, t: '\\n        ' },\n      { c: T, t: 'Text' }, { c: P, t: '(' }, { c: S, t: '\"Walde\"' }, { c: P, t: ')' }, { c: W, t: '\\n    ' },\n      { c: W, t: '}' }, { c: W, t: '\\n' },\n      { c: W, t: '}' }\n    ];\n    const caret = '<span style=\"display:inline-block;width:6px;height:12px;margin-left:1px;vertical-align:-2px;background:#6FE0A0;animation:caretBlink 1s step-end infinite\"><\u002Fspan>';\n    const esc = (s) => s.replace(/&/g, '&amp;').replace(/<\u002Fg, '&lt;').replace(/>/g, '&gt;');\n    const total = segs.reduce((a, s) => a + s.t.length, 0);\n    const build = (n) => {\n      let out = '', count = 0;\n      for (const sg of segs) {\n        if (count >= n) break;\n        const take = Math.min(sg.t.length, n - count);\n        out += '<span style=\"color:' + sg.c + '\">' + esc(sg.t.slice(0, take)) + '<\u002Fspan>';\n        count += take;\n        if (take < sg.t.length) break;\n      }\n      return out;\n    };\n    const reduce = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;\n    if (reduce) { el.innerHTML = build(total) + caret; return; }\n    let n = 0;\n    const tick = () => {\n      n++;\n      el.innerHTML = build(n) + caret;\n      if (n >= total) {\n        this._st = setTimeout(() => { n = 0; el.innerHTML = caret; this._st = setTimeout(tick, 700); }, 3400);\n        return;\n      }\n      this._st = setTimeout(tick, 26 + Math.random() * 30);\n    };\n    this._st = setTimeout(tick, 900);\n  }\n\n  startCodeTyper() {\n    clearTimeout(this._ct);\n    const el = this.plcRef.current;\n    if (!el) return;\n    const segs = [\n      { c: '#7FC8FF', t: 'FUNCTION' }, { c: '#E7F0EA', t: ' StartPump' }, { c: '#8FA096', t: ' : ' }, { c: '#6FE0A0', t: 'BOOL' }, { c: '#E7F0EA', t: '\\n' },\n      { c: '#7FC8FF', t: 'VAR_INPUT' }, { c: '#E7F0EA', t: '\\n    ' },\n      { c: '#E7F0EA', t: 'Level, SetPoint' }, { c: '#8FA096', t: ' : ' }, { c: '#6FE0A0', t: 'REAL' }, { c: '#8FA096', t: ';' }, { c: '#E7F0EA', t: '\\n' },\n      { c: '#7FC8FF', t: 'END_VAR' }, { c: '#E7F0EA', t: '\\n\\n' },\n      { c: '#C9A6FF', t: 'IF' }, { c: '#E7F0EA', t: ' Level ' }, { c: '#8FA096', t: '<' }, { c: '#E7F0EA', t: ' SetPoint ' }, { c: '#C9A6FF', t: 'THEN' }, { c: '#E7F0EA', t: '\\n    ' },\n      { c: '#E7F0EA', t: 'StartPump' }, { c: '#8FA096', t: ' := ' }, { c: '#F4B860', t: 'TRUE' }, { c: '#8FA096', t: ';' }, { c: '#E7F0EA', t: '\\n' },\n      { c: '#C9A6FF', t: 'ELSE' }, { c: '#E7F0EA', t: '\\n    ' },\n      { c: '#E7F0EA', t: 'StartPump' }, { c: '#8FA096', t: ' := ' }, { c: '#F4B860', t: 'FALSE' }, { c: '#8FA096', t: ';' }, { c: '#E7F0EA', t: '\\n' },\n      { c: '#C9A6FF', t: 'END_IF' }, { c: '#8FA096', t: ';' }\n    ];\n    const caret = '<span style=\"display:inline-block;width:7px;height:14px;margin-left:1px;vertical-align:-2px;background:#6FE0A0;animation:caretBlink 1s step-end infinite\"><\u002Fspan>';\n    const esc = (s) => s.replace(/&/g, '&amp;').replace(/<\u002Fg, '&lt;').replace(/>/g, '&gt;');\n    const total = segs.reduce((a, s) => a + s.t.length, 0);\n    const build = (n) => {\n      let out = '', count = 0;\n      for (const sg of segs) {\n        if (count >= n) break;\n        const take = Math.min(sg.t.length, n - count);\n        out += '<span style=\"color:' + sg.c + '\">' + esc(sg.t.slice(0, take)) + '<\u002Fspan>';\n        count += take;\n        if (take < sg.t.length) break;\n      }\n      return out;\n    };\n    const reduce = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;\n    if (reduce) { el.innerHTML = build(total) + caret; return; }\n    let n = 0;\n    const tick = () => {\n      n++;\n      el.innerHTML = build(n) + caret;\n      if (n >= total) {\n        this._ct = setTimeout(() => { n = 0; el.innerHTML = caret; this._ct = setTimeout(tick, 650); }, 3600);\n        return;\n      }\n      this._ct = setTimeout(tick, 20 + Math.random() * 26);\n    };\n    this._ct = setTimeout(tick, 500);\n  }\n\n  componentDidUpdate(prevProps, prevState) {\n    if (prevState.lang !== this.state.lang) this.startTyper();\n  }\n\n  startTyper() {\n    clearTimeout(this._t);\n    const el = this.aiRef.current;\n    if (!el) return;\n    const reduce = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;\n    this._lang = this.state.lang;\n    el.textContent = '';\n    if (reduce) { el.textContent = COPY[this._lang].aiTasks[0]; return; }\n    let li = 0, ci = 0, deleting = false;\n    const tick = () => {\n      // pick up a language switch at the next frame without needing a restart\n      if (this._lang !== this.state.lang) { this._lang = this.state.lang; li = 0; ci = 0; deleting = false; el.textContent = ''; }\n      const lines = COPY[this._lang].aiTasks;\n      const full = lines[li % lines.length];\n      if (!deleting) {\n        ci++;\n        el.textContent = full.slice(0, ci);\n        if (ci >= full.length) { deleting = true; this._t = setTimeout(tick, 1800); return; }\n        this._t = setTimeout(tick, 55 + Math.random() * 45);\n      } else {\n        ci--;\n        el.textContent = full.slice(0, Math.max(0, ci));\n        if (ci <= 0) { deleting = false; li = (li + 1) % lines.length; this._t = setTimeout(tick, 320); return; }\n        this._t = setTimeout(tick, 26);\n      }\n    };\n    this._t = setTimeout(tick, 520);\n  }\n\n  componentWillUnmount() { clearTimeout(this._t); clearTimeout(this._ct); clearTimeout(this._st); }\n\n  setLang = (lang) => {\n    try { localStorage.setItem('walde-lang', lang); } catch (e) {}\n    this.setState({ lang });\n  };\n\n  toggleMenu = () => this.setState(s => ({ menuOpen: !s.menuOpen }));\n  closeMenu = () => this.setState({ menuOpen: false });\n\n  handleSubmit = (e) => {\n    e.preventDefault();\n    const form = e.target;\n    const name = form.name.value.trim();\n    const email = form.email.value.trim();\n    const message = form.message.value.trim();\n\n    if (!name || !email || !message) {\n      this.setState({ statusKey: 'fill', statusType: 'error' });\n      return;\n    }\n    if (!/^[^\\s@]+@[^\\s@]+\\.[^\\s@]+$/.test(email)) {\n      this.setState({ statusKey: 'email', statusType: 'error' });\n      return;\n    }\n    // TODO: koble til faktisk sendetjeneste (Formspree, e-post-API, e.l.)\n    this.setState({ statusKey: 'notConnected', statusType: 'error' });\n  };\n\n  renderVals() {\n    const lang = this.state.lang;\n    const t = COPY[lang];\n    const activeBg = 'rgba(95,208,138,0.92)';\n    const activeFg = '#062013';\n    const idleBg = 'transparent';\n    const idleFg = '#C7D6CC';\n    const isNo = lang === 'no';\n    return {\n      t,\n      year: new Date().getFullYear(),\n      svcPlc: t.services[0],\n      svc2: t.services[1],\n      svc3: t.services[2],\n      svc4: t.services[3],\n      svc5: t.services[4],\n      svcAi: t.services[5],\n      swiftRef: this.swiftRef,\n      showHeroPhoto: this.props.showHeroPhoto ?? true,\n      showProjects: this.props.showProjects ?? true,\n      handleSubmit: this.handleSubmit,\n      aiRef: this.aiRef,\n      plcRef: this.plcRef,\n      toggleMenu: this.toggleMenu,\n      closeMenu: this.closeMenu,\n      menuOpenStr: this.state.menuOpen ? 'true' : 'false',\n      setNo: () => this.setLang('no'),\n      setEn: () => this.setLang('en'),\n      noBg: isNo ? activeBg : idleBg,\n      noFg: isNo ? activeFg : idleFg,\n      enBg: isNo ? idleBg : activeBg,\n      enFg: isNo ? idleFg : activeFg,\n      hasStatus: !!this.state.statusKey,\n      statusMsg: this.state.statusKey ? t.statuses[this.state.statusKey] : '',\n      statusColor: this.state.statusType === 'success' ? '#6FE0A0' : '#FF9B9B'\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
